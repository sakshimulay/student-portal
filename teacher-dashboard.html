<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Student Self-Service Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Teacher Portal</h2>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" onclick="showSection('upload-attendance')">📋 Upload Attendance</button>
                <button class="nav-btn" onclick="showSection('upload-results')">📊 Upload Results</button>
                <button class="nav-btn" onclick="showSection('post-notice')">📢 Post Notice</button>
                <button class="nav-btn logout" onclick="logout()">🚪 Logout</button>
            </nav>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>Teacher Dashboard</h1>
                <p id="userName">Welcome</p>
            </div>

            <!-- Upload Attendance Section -->
            <section id="upload-attendance" class="content-section">
                <h2>📋 Upload Attendance</h2>
                <form id="attendanceForm" onsubmit="uploadAttendance(event)">
                    <div class="form-group">
                        <label for="studentId">Student ID:</label>
                        <input type="text" id="studentId" name="studentId" required>
                    </div>
                    <div class="form-group">
                        <label for="attendanceDate">Date:</label>
                        <input type="date" id="attendanceDate" name="attendanceDate" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject:</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status" name="status" required>
                            <option value="">-- Select Status --</option>
                            <option value="present">Present</option>
                            <option value="absent">Absent</option>
                            <option value="late">Late</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload</button>
                </form>
            </section>

            <!-- Upload Results Section -->
            <section id="upload-results" class="content-section hidden">
                <h2>📊 Upload Results</h2>
                <form id="resultsForm" onsubmit="uploadResults(event)">
                    <div class="form-group">
                        <label for="resultStudentId">Student ID:</label>
                        <input type="text" id="resultStudentId" name="resultStudentId" required>
                    </div>
                    <div class="form-group">
                        <label for="resultSubject">Subject:</label>
                        <input type="text" id="resultSubject" name="resultSubject" required>
                    </div>
                    <div class="form-group">
                        <label for="marks">Marks Obtained:</label>
                        <input type="number" id="marks" name="marks" required>
                    </div>
                    <div class="form-group">
                        <label for="totalMarks">Total Marks:</label>
                        <input type="number" id="totalMarks" name="totalMarks" value="100" required>
                    </div>
                    <div class="form-group">
                        <label for="grade">Grade:</label>
                        <input type="text" id="grade" name="grade" placeholder="e.g., A+" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Upload</button>
                </form>
            </section>

            <!-- Post Notice Section -->
            <section id="post-notice" class="content-section hidden">
                <h2>📢 Post Notice</h2>
                <form id="noticeForm" onsubmit="postNotice(event)">
                    <div class="form-group">
                        <label for="noticeTitle">Title:</label>
                        <input type="text" id="noticeTitle" name="noticeTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="noticeContent">Content:</label>
                        <textarea id="noticeContent" name="noticeContent" rows="5" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="visibility">Visibility:</label>
                        <select id="visibility" name="visibility" required>
                            <option value="">-- Select Visibility --</option>
                            <option value="all">All</option>
                            <option value="students">Students Only</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Post Notice</button>
                </form>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        let currentUser = null;
        let teacherId = null;

        // Initialize
        window.addEventListener('load', function() {
            const userStr = localStorage.getItem('user');
            if (!userStr) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = JSON.parse(userStr);
            if (currentUser.role !== 'teacher') {
                window.location.href = 'login.html';
                return;
            }

            teacherId = currentUser.id;
            document.getElementById('userName').textContent = `Welcome, ${currentUser.name}`;
        });

        function showSection(sectionId) {
            const sections = document.querySelectorAll('.content-section');
            sections.forEach(section => section.classList.add('hidden'));
            document.getElementById(sectionId).classList.remove('hidden');

            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function uploadAttendance(event) {
            event.preventDefault();
            
            const studentId = document.getElementById('studentId').value;
            const date = document.getElementById('attendanceDate').value;
            const subject = document.getElementById('subject').value;
            const status = document.getElementById('status').value;

            try {
                const response = await fetch('http://localhost:5000/api/teacher/upload-attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        studentId,
                        date,
                        subject,
                        status,
                        uploadedBy: teacherId
                    })
                });

                const data = await response.json();
                alert(data.message || 'Attendance uploaded successfully!');
                document.getElementById('attendanceForm').reset();
            } catch (error) {
                console.error('Error uploading attendance:', error);
                alert('Error uploading attendance');
            }
        }

        async function uploadResults(event) {
            event.preventDefault();
            
            const studentId = document.getElementById('resultStudentId').value;
            const subject = document.getElementById('resultSubject').value;
            const marks = parseInt(document.getElementById('marks').value);
            const totalMarks = parseInt(document.getElementById('totalMarks').value);
            const grade = document.getElementById('grade').value;

            try {
                const response = await fetch('http://localhost:5000/api/teacher/upload-results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        studentId,
                        subject,
                        marks,
                        totalMarks,
                        grade,
                        uploadedBy: teacherId
                    })
                });

                const data = await response.json();
                alert(data.message || 'Results uploaded successfully!');
                document.getElementById('resultsForm').reset();
            } catch (error) {
                console.error('Error uploading results:', error);
                alert('Error uploading results');
            }
        }

        async function postNotice(event) {
            event.preventDefault();
            
            const title = document.getElementById('noticeTitle').value;
            const content = document.getElementById('noticeContent').value;
            const visibility = document.getElementById('visibility').value;

            try {
                const response = await fetch('http://localhost:5000/api/teacher/post-notice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title,
                        content,
                        createdBy: teacherId,
                        visibility
                    })
                });

                const data = await response.json();
                alert(data.message || 'Notice posted successfully!');
                document.getElementById('noticeForm').reset();
            } catch (error) {
                console.error('Error posting notice:', error);
                alert('Error posting notice');
            }
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
